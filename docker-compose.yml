services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clinical_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  clinical-ai:
    build: .
    stdin_open: true
    tty: true
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: clinical_db
      DB_USER: postgres
      DB_PASS: postgres
    volumes:
      - envdata:/app/env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  envdata:
